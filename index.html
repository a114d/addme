<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddMe | My Links</title>
    
    <meta name="description" content="Personal link-in-bio page for my social media and projects.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Modern Design System */
        :root {
            --primary: #2563eb; /* Professional Blue */
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Profile Section */
        header {
            margin-bottom: 30px;
        }

        .profile-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #fff;
            border: 3px solid white;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.025em;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        /* Links Section */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.1);
        }

        .arrow-icon {
            font-size: 1.1rem;
            opacity: 0.4;
            transition: var(--transition);
        }

        .link-card:hover .arrow-icon {
            transform: translateX(5px);
            opacity: 1;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Entry Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            body { padding: 20px; }
            .link-card { padding: 14px 18px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-wrapper">
                <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
            </div>
            <h1>Your Name</h1>
            <p class="bio">Developer | Content Creator | Tech Enthusiast</p>
        </header>

        <main class="links-list">
            <a href="https://twitter.com/yourusername" class="link-card" target="_blank">
                <span>Twitter (X)</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://instagram.com/yourusername" class="link-card" target="_blank">
                <span>Instagram</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://github.com/a114d" class="link-card" target="_blank">
                <span>GitHub</span>
                <span class="arrow-icon">→</span>
            </a>

            <a href="https://linkedin.com/in/yourusername" class="link-card" target="_blank">
                <span>LinkedIn</span>
                <span class="arrow-icon">→</span>
            </a>
            
            <a href="mailto:your@email.com" class="link-card">
                <span>Contact Me</span>
                <span class="arrow-icon">→</span>
            </a>
        </main>

        <footer>
            <p>Developed by <a href="https://github.com/a114d">a114d</a></p>
        </footer>
    </div>

</body>
</html>
