<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AddMe | Ahmed Saleh</title>

<meta name="description"
content="Ahmed Saleh Personal Contact Card">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* ========== BASE ========== */

* {

margin:0;
padding:0;
box-sizing:border-box;

font-family:'Inter',sans-serif;

}

body {

background:
linear-gradient(
135deg,
#130035,
#2a0e28,
#644100
);

min-height:100vh;

display:flex;

align-items:center;
justify-content:center;

overflow:hidden;

perspective:1000px;

color:white;

}

/* ========== BACKGROUND ANIMATION ========== */

.stars,
.dots {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

}

.star {

position:absolute;

background:white;

border-radius:50%;

animation:starFloat linear infinite;

}

.dot {

position:absolute;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(255,255,255,0.8),
rgba(255,255,255,0)
);

animation:float linear infinite;

}

/* ========== CARD ========== */

.card {

background:
rgba(255,255,255,0.1);

backdrop-filter:blur(12px);

border-radius:20px;

padding:30px;

width:100%;
max-width:400px;

border:

1px solid rgba(255,255,255,0.2);

box-shadow:

0 10px 30px rgba(0,0,0,0.3);

animation:cardFloat 3s ease-in-out infinite;

z-index:1;

}

/* Profile */

.profile {

width:150px;
height:150px;

margin:0 auto 20px;

border-radius:20px;

overflow:hidden;

border:3px solid rgba(255,255,255,0.3);

}

.profile img {

width:100%;
height:100%;

object-fit:cover;

}

/* Text */

.name {

font-size:24px;

text-align:center;

margin-bottom:10px;

}

.bio {

text-align:center;

margin-bottom:25px;

opacity:.9;

}

/* Social Buttons */

.social-links {

display:grid;

gap:12px;

margin-bottom:25px;

}

.social-button {

display:flex;

align-items:center;

gap:10px;

padding:12px 18px;

border-radius:12px;

text-decoration:none;

color:white;

font-weight:600;

transition:.3s;

}

.social-button:hover {

transform:translateY(-3px);

}

/* Colors */

.instagram {

background:
linear-gradient(
45deg,
#f09433,
#dc2743,
#bc1888
);

}

.snapchat {

background:
linear-gradient(
45deg,
#FFFC00,
#FFE100
);

color:black;

}

.tiktok {

background:black;

}

.whatsapp {

background:
linear-gradient(
45deg,
#25D366,
#128C7E
);

}

.telegram {

background:
linear-gradient(
45deg,
#0088cc,
#32A7E1
);

}

/* Actions */

.actions {

display:flex;

gap:10px;

justify-content:center;

}

button {

padding:12px 20px;

border:none;

border-radius:12px;

background:

rgba(255,255,255,0.15);

color:white;

cursor:pointer;

font-weight:600;

transition:.3s;

}

button:hover {

background:

rgba(255,255,255,0.3);

}

/* QR */

.qr-container {

display:none;

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

background:white;

color:black;

padding:25px;

border-radius:20px;

z-index:999;

text-align:center;

}

.qr-overlay {

display:none;

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

background:rgba(0,0,0,.6);

z-index:998;

}

/* Toast */

#toast {

position:fixed;

bottom:20px;
left:50%;

transform:translateX(-50%);

background:black;

color:white;

padding:12px 20px;

border-radius:10px;

opacity:0;

transition:.3s;

}

#toast.show {

opacity:1;

}

/* Animations */

@keyframes cardFloat {

0%,100% {

transform:translateY(0);

}

50% {

transform:translateY(-10px);

}

}

@keyframes float {

to {

transform:

translate(
var(--moveX),
var(--moveY)
);

}

}

@keyframes starFloat {

to {

transform:

translateY(-100vh);

}

}

</style>

</head>

<body>

<div class="dots" id="dots"></div>
<div class="stars" id="stars"></div>

<div class="card">

<div class="profile">

<img src="IMG_0635.jpg">

</div>

<h1 class="name">

Ahmed Saleh

</h1>

<p class="bio">

IT Specialist ♦ Project Manager  
Human Rights Activist ♣  
Coffee Lover ♥

</p>

<div class="social-links">

<a href="https://www.instagram.com/a1_1md"
class="social-button instagram">

<i class="fab fa-instagram"></i>
Instagram

</a>

<a href="https://www.snapchat.com/add/a1_1md"
class="social-button snapchat">

<i class="fab fa-snapchat-ghost"></i>
Snapchat

</a>

<a href="https://www.tiktok.com/@a_a.0d"
class="social-button tiktok">

<i class="fab fa-tiktok"></i>
TikTok

</a>

<a href="https://wa.me/+31687746339"
class="social-button whatsapp">

<i class="fab fa-whatsapp"></i>
WhatsApp

</a>

<a href="https://t.me/a1_1md"
class="social-button telegram">

<i class="fab fa-telegram"></i>
Telegram

</a>

</div>

<div class="actions">

<button onclick="saveContact()">

<i class="fas fa-save"></i>
Save Contact

</button>

<button onclick="showQR(window.location.href)">

<i class="fas fa-qrcode"></i>
QR Code

</button>

</div>

</div>

<div class="qr-overlay"
onclick="closeQR()"></div>

<div class="qr-container"
id="qrContainer">

<h3>Scan Me</h3>

<div id="qrCode"></div>

</div>

<div id="toast"></div>

<script>

/* Stars */

function createStars(){

const container =
document.getElementById("stars");

for(let i=0;i<80;i++){

const star =
document.createElement("div");

star.className="star";

const size =
Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=
Math.random()*100+"vw";

star.style.top=
Math.random()*100+"vh";

star.style.animationDuration=
Math.random()*10+10+"s";

container.appendChild(star);

}

}

/* Dots */

function createDots(){

const container =
document.getElementById("dots");

for(let i=0;i<40;i++){

const dot =
document.createElement("div");

dot.className="dot";

const size =
Math.random()*6+2;

dot.style.width=size+"px";
dot.style.height=size+"px";

dot.style.left=
Math.random()*100+"vw";

dot.style.top=
Math.random()*100+"vh";

dot.style.setProperty(
"--moveX",
(Math.random()-0.5)*200+"px"
);

dot.style.setProperty(
"--moveY",
(Math.random()-0.5)*200+"px"
);

dot.style.animationDuration=
Math.random()*6+6+"s";

container.appendChild(dot);

}

}

/* QR */

function showQR(url){

const qrCode =
document.getElementById("qrCode");

qrCode.innerHTML="";

new QRCode(qrCode,{

text:url,

width:200,
height:200

});

document
.getElementById("qrContainer")
.style.display="block";

document
.querySelector(".qr-overlay")
.style.display="block";

}

function closeQR(){

document
.getElementById("qrContainer")
.style.display="none";

document
.querySelector(".qr-overlay")
.style.display="none";

}

/* Toast */

function showToast(msg){

const t =
document.getElementById("toast");

t.textContent=msg;

t.classList.add("show");

setTimeout(()=>{

t.classList.remove("show");

},3000);

}

/* Save Contact */

function saveContact(){

const vcard=
`BEGIN:VCARD
VERSION:3.0
FN:Ahmed Saleh
TITLE:IT Specialist
TEL:+31687746339
END:VCARD`;

const blob=
new Blob([vcard],
{type:"text/vcard"});

const url=
URL.createObjectURL(blob);

const a=
document.createElement("a");

a.href=url;

a.download=
"ahmed_saleh.vcf";

a.click();

showToast("Contact Saved!");

}

/* Start */

createStars();
createDots();

</script>

</body>
</html>
